<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hearsay · calendar on glasses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif; color: #F5F5F7;
    background: linear-gradient(165deg, #0A0A0F 0%, #0E0E16 100%);
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  @keyframes bar { 0%,100% { transform: scaleY(0.16); } 50% { transform: scaleY(1); } }
  @keyframes flow { 0% { transform: translate(0,-50%); opacity: 0; } 12% { opacity: 1; } 84% { opacity: 1; } 100% { transform: translate(72px,-50%); opacity: 0; } }
  @keyframes popIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: none; } }
  @keyframes mintGlow { 0% { box-shadow: 0 0 0 rgba(52,211,153,0), 0 8px 30px rgba(0,0,0,.35); } 25% { box-shadow: 0 0 36px rgba(52,211,153,.5), 0 8px 30px rgba(0,0,0,.35); } 100% { box-shadow: 0 0 0 rgba(52,211,153,0), 0 8px 30px rgba(0,0,0,.35); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  @keyframes think { 0%,100% { opacity: .25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-4px); } }
  @keyframes breathe { 0%,100% { transform: scale(.85); opacity: .5; } 50% { transform: scale(1.15); opacity: 1; } }
  @keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px,-30px); } }

  .glow { position: absolute; border-radius: 50%; filter: blur(20px); pointer-events: none; }
  .panel {
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(22,22,31,.66), rgba(16,16,24,.5));
    border: 1px solid rgba(255,255,255,.06);
    backdrop-filter: blur(16px) saturate(1.1); -webkit-backdrop-filter: blur(16px) saturate(1.1);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 20px 50px rgba(0,0,0,.35);
  }
  .ph { display:flex; flex-direction:column; gap:7px; margin-bottom:18px; }
  .ph .row { display:flex; align-items:center; gap:10px; }
  .ph .lbl { font-size:12px; letter-spacing:.22em; color:#8A8A99; }
  .ph .sub { font-size:11px; color:#4A4A56; padding-left:17px; }

  button.ctl {
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500; letter-spacing:.04em;
    color:#CBD5E1; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1);
    padding:8px 14px; border-radius:10px; cursor:pointer; transition:.15s;
  }
  button.ctl:hover { border-color:rgba(34,211,238,.5); color:#E9FBFF; transform:translateY(-1px); }
  button.ctl.primary { background:rgba(52,211,153,.12); border-color:rgba(52,211,153,.4); color:#6EE7B7; }
  button.ctl.primary:hover { box-shadow:0 4px 18px rgba(52,211,153,.25); }

  .badge { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.14em; padding:5px 10px; border-radius:7px; }
  .badge.mock { background:rgba(251,191,36,.12); color:#FBBF24; border:1px solid rgba(251,191,36,.35); }
  .badge.live { background:rgba(52,211,153,.12); color:#34D399; border:1px solid rgba(52,211,153,.35); }

  #cards::-webkit-scrollbar, #caps::-webkit-scrollbar { width:6px; }
  #cards::-webkit-scrollbar-thumb, #caps::-webkit-scrollbar-thumb { background:rgba(255,255,255,.08); border-radius:3px; }
</style>
</head>
<body>
<div style="position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;">

  <div class="glow" style="top:-180px;left:8%;width:520px;height:520px;background:radial-gradient(circle,rgba(99,102,241,.16),transparent 65%);animation:drift 18s ease-in-out infinite;"></div>
  <div class="glow" style="bottom:-200px;right:10%;width:560px;height:560px;background:radial-gradient(circle,rgba(34,211,238,.12),transparent 65%);animation:drift 22s ease-in-out infinite reverse;"></div>

  <!-- HEADER -->
  <header style="flex:none;display:flex;align-items:center;justify-content:space-between;padding:20px 36px;position:relative;z-index:3;">
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="display:flex;align-items:center;gap:3px;">
        <div style="width:18px;height:18px;border:2px solid #22D3EE;border-radius:50%;box-shadow:0 0 10px rgba(34,211,238,.5);"></div>
        <div style="width:7px;height:2px;background:#22D3EE;"></div>
        <div style="width:18px;height:18px;border:2px solid #22D3EE;border-radius:50%;box-shadow:0 0 10px rgba(34,211,238,.5);"></div>
      </div>
      <div style="display:flex;flex-direction:column;line-height:1;">
        <span style="font-size:18px;font-weight:700;letter-spacing:-.02em;">hearsay</span>
        <span class="mono" style="font-size:10px;letter-spacing:.18em;color:#5A5A68;margin-top:4px;">CALENDAR · ON GLASSES</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="mode" class="badge mock">MOCK</span>
      <div id="statusPill" style="display:flex;align-items:center;gap:9px;padding:8px 15px;border-radius:999px;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.25);">
        <div id="statusDot" style="width:8px;height:8px;border-radius:50%;background:#5A5A68;"></div>
        <span id="statusText" class="mono" style="font-size:12px;letter-spacing:.16em;color:#A9F0FA;">CONNECTING…</span>
      </div>
      <button class="ctl primary" onclick="send('demo')">▶ Demo</button>
      <button class="ctl" onclick="send('mic')">🎙 Mic</button>
      <button class="ctl" onclick="send('reset')">↺</button>
      <button class="ctl" onclick="toggleCal()">📅</button>
    </div>
  </header>

  <!-- MAIN -->
  <main style="flex:1;display:flex;align-items:stretch;padding:6px 36px 12px;position:relative;z-index:2;min-height:0;">

    <!-- STAGE 1 — LISTENING -->
    <section class="panel" style="flex:1;min-width:0;display:flex;flex-direction:column;padding:24px;">
      <div class="ph">
        <div class="row"><div style="width:7px;height:7px;border-radius:50%;background:#22D3EE;box-shadow:0 0 8px #22D3EE;"></div><span class="mono lbl">LISTENING</span></div>
        <span class="mono sub">deepgram · nova-3</span>
      </div>
      <div id="wave" style="display:flex;align-items:center;justify-content:center;gap:3px;height:54px;margin-bottom:22px;transition:transform .12s ease;transform:scaleY(.4);"></div>
      <div id="caps" style="flex:1;min-height:0;display:flex;flex-direction:column;justify-content:flex-end;gap:13px;overflow:hidden;"></div>
    </section>

    <!-- CONNECTOR -->
    <div style="position:relative;width:80px;flex:none;align-self:stretch;">
      <div style="position:absolute;top:50%;left:6px;right:6px;height:1px;background:linear-gradient(90deg,rgba(99,102,241,.04),rgba(34,211,238,.5),rgba(99,102,241,.04));transform:translateY(-.5px);"></div>
      <div style="position:absolute;top:50%;left:6px;width:5px;height:5px;border-radius:50%;background:#22D3EE;box-shadow:0 0 8px #22D3EE;animation:flow 2.4s linear 0s infinite;"></div>
      <div style="position:absolute;top:50%;left:6px;width:5px;height:5px;border-radius:50%;background:#22D3EE;box-shadow:0 0 8px #22D3EE;animation:flow 2.4s linear .8s infinite;"></div>
      <div style="position:absolute;top:50%;left:6px;width:5px;height:5px;border-radius:50%;background:#7DD3FC;box-shadow:0 0 8px #22D3EE;animation:flow 2.4s linear 1.6s infinite;"></div>
      <div style="position:absolute;top:50%;right:2px;width:7px;height:7px;border-top:1.5px solid rgba(34,211,238,.6);border-right:1.5px solid rgba(34,211,238,.6);transform:translate(0,-50%) rotate(45deg);"></div>
    </div>

    <!-- STAGE 2 — UNDERSTANDING -->
    <section class="panel" style="flex:1.12;min-width:0;display:flex;flex-direction:column;padding:24px;">
      <div class="ph">
        <div class="row"><div style="width:7px;height:7px;border-radius:50%;background:#818CF8;box-shadow:0 0 8px #818CF8;"></div><span class="mono lbl">UNDERSTANDING</span></div>
        <span class="mono sub">claude · haiku-4.5</span>
      </div>
      <!-- decision state -->
      <div id="decision" style="flex:none;display:flex;align-items:center;justify-content:center;min-height:70px;margin-bottom:8px;"></div>
      <!-- committed event cards -->
      <div id="cards" style="flex:1;min-height:0;display:flex;flex-direction:column;gap:11px;overflow-y:auto;padding-right:4px;"></div>
    </section>
  </main>

  <!-- CALENDAR (toggle) -->
  <section id="calPanel" class="panel" style="display:none;flex:none;height:34vh;margin:0 36px 8px;overflow:hidden;position:relative;z-index:2;">
    <iframe id="cal" src="about:blank" style="width:100%;height:100%;border:0;background:#fff;border-radius:22px;"></iframe>
  </section>

  <!-- FOOTER -->
  <footer style="flex:none;display:flex;align-items:center;justify-content:space-between;padding:12px 38px 18px;position:relative;z-index:2;">
    <div class="mono" style="display:flex;align-items:center;gap:12px;font-size:11px;color:#4A4A56;letter-spacing:.04em;">
      <span>ray-ban meta mic</span><span style="color:#2E2E38;">→</span>
      <span>deepgram nova-3</span><span style="color:#2E2E38;">→</span>
      <span style="color:#818CF8;">claude haiku-4.5</span><span style="color:#2E2E38;">→</span>
      <span style="color:#34D399;">google calendar</span>
    </div>
    <span style="font-size:13px;color:#6E6E80;letter-spacing:-.01em;">Your calendar, handled by your glasses.</span>
  </footer>
</div>

<script>
  const $ = id => document.getElementById(id);

  // ---- waveform bars ----
  const wave = $('wave');
  for (let i = 0; i < 32; i++) {
    const b = document.createElement('div');
    b.style.cssText = `width:4px;height:100%;border-radius:2px;transform-origin:center;background:linear-gradient(180deg,#22D3EE,#6366F1);animation:bar ${(0.85+Math.random()*0.9).toFixed(2)}s ease-in-out ${Math.random().toFixed(2)}s infinite;`;
    wave.appendChild(b);
  }

  // ---- config (mode + calendar embed) ----
  fetch('/config').then(r => r.json()).then(c => {
    $('cal').src = c.cal_embed;
    setMode(c.mode);
  });
  let CURRENT_MODE = 'mock';
  function setMode(mode) {
    CURRENT_MODE = mode;
    const el = $('mode');
    el.textContent = mode === 'live' ? 'LIVE' : 'MOCK · not saved';
    el.className = 'badge ' + (mode === 'live' ? 'live' : 'mock');
  }

  // ---- status ----
  function setStatus(text) {
    const map = {
      listening: ['LIVE · LISTENING', '#22D3EE', 'blink 1.4s ease-in-out infinite'],
      'demo running': ['LIVE · DEMO', '#22D3EE', 'blink 1.4s ease-in-out infinite'],
      thinking: ['UNDERSTANDING…', '#818CF8', 'blink .7s ease-in-out infinite'],
      idle: ['IDLE', '#5A5A68', 'none'],
      'demo complete': ['DEMO COMPLETE', '#34D399', 'none'],
      disconnected: ['DISCONNECTED', '#FB7185', 'none'],
    };
    const [label, color, anim] = map[text] || [text.toUpperCase(), '#5A5A68', 'none'];
    $('statusText').textContent = label;
    const dot = $('statusDot');
    dot.style.background = color;
    dot.style.boxShadow = anim === 'none' ? 'none' : `0 0 10px ${color}`;
    dot.style.animation = anim;
    if (text === 'thinking') showThinking();
    else if (!cardsEl.children.length || text === 'idle') showIdle();
  }

  // ---- captions (left) ----
  const capsEl = $('caps');
  let interimEl = null, lines = [];
  function renderCaps() {
    capsEl.innerHTML = '';
    const all = interimEl ? [...lines, {text: interimEl, interim: true}] : lines.map(t => ({text: t}));
    all.slice(-5).forEach((l, i, arr) => {
      const active = i === arr.length - 1;
      const d = document.createElement('div');
      d.className = 'mono';
      d.textContent = l.text;
      d.style.cssText = `font-size:17px;line-height:1.45;padding-left:12px;transition:all .4s ease;animation:fadeUp .45s ease both;`
        + (active ? 'color:#E9FBFF;opacity:1;border-left:2px solid #22D3EE;' : 'color:#7A7A88;opacity:.55;border-left:2px solid transparent;');
      capsEl.appendChild(d);
    });
    capsEl.scrollTop = capsEl.scrollHeight;
  }
  function addCaption(text, final) {
    if (final) { interimEl = null; lines.push(text); }
    else interimEl = text;
    renderCaps();
  }

  // ---- understanding (right) ----
  const decEl = $('decision'), cardsEl = $('cards');
  let revealTimer = null;
  function showIdle() {
    if (revealTimer) return;
    decEl.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:13px;">
      <div style="width:12px;height:12px;border-radius:50%;background:#6366F1;box-shadow:0 0 16px #6366F1;animation:breathe 2.4s ease-in-out infinite;"></div>
      <span class="mono" style="font-size:13px;color:#5A5A68;letter-spacing:.04em;">listening for a plan…</span></div>`;
  }
  function showThinking() {
    if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
    decEl.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:9px;height:9px;border-radius:50%;background:#818CF8;animation:think 1s ease-in-out 0s infinite;"></div>
        <div style="width:9px;height:9px;border-radius:50%;background:#818CF8;animation:think 1s ease-in-out .18s infinite;"></div>
        <div style="width:9px;height:9px;border-radius:50%;background:#818CF8;animation:think 1s ease-in-out .36s infinite;"></div>
      </div><span class="mono" style="font-size:13px;color:#8A8A99;letter-spacing:.04em;">reading intent…</span></div>`;
  }

  // map a raw action string -> {tool, accent, title, detail, cancelled, muted}
  function classify(text) {
    const q = text.match(/['‘']([^'’']+)['’']/);
    const title = q ? q[1] : null;
    if (text.startsWith('📅')) return { tool: 'create_calendar_event', accent: '#34D399', title: title || 'Event', detail: text.replace(/^📅\s*/, '') };
    if (text.startsWith('🔁')) return { tool: 'reschedule_event', accent: '#818CF8', title: title || 'Rescheduled', detail: text.replace(/^🔁\s*/, '') };
    if (text.startsWith('🗑️') || text.startsWith('🗑')) return { tool: 'cancel_event', accent: '#FBBF24', title: title || 'Cancelled', detail: text.replace(/^🗑️?\s*/, ''), cancelled: true };
    if (text.startsWith('💬')) return { tool: 'no_action', accent: '#6E6E80', muted: true, detail: 'no concrete plan' };
    if (text.startsWith('⚠️')) return { tool: 'error', accent: '#FB7185', muted: true, detail: text.replace(/^⚠️\s*/, '') };
    return { tool: 'create_calendar_event', accent: '#34D399', title: title || 'Event', detail: text };
  }

  function revealDecision(c) {
    if (revealTimer) clearTimeout(revealTimer);
    const pill = `font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:${c.accent};background:${c.accent}1f;border:1px solid ${c.accent}55;padding:5px 11px;border-radius:8px;`;
    decEl.innerHTML = `<div class="panel" style="width:100%;max-width:440px;padding:18px 20px;background:rgba(13,13,20,.7);animation:popIn .45s cubic-bezier(.22,1,.36,1) both;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${c.muted?'0':'12px'};">
        <span class="mono" style="font-size:11px;letter-spacing:.18em;color:#5A5A68;">TOOL CALL</span>
        <span style="${pill}">${c.tool}</span>
      </div>
      ${c.muted ? '' : `<div class="mono" style="font-size:13px;color:#CBD5E1;line-height:1.5;">${c.detail}</div>`}
    </div>`;
    revealTimer = setTimeout(() => { revealTimer = null; showIdle(); }, 2600);
  }

  function addCard(c) {
    if (c.muted) return;
    const card = document.createElement('div');
    card.style.cssText = `position:relative;padding:15px 18px 14px 24px;border-radius:15px;background:rgba(20,20,28,.62);`
      + `border:1px solid ${c.cancelled?'rgba(251,191,36,.22)':'rgba(255,255,255,.07)'};backdrop-filter:blur(10px);`
      + `box-shadow:0 8px 30px rgba(0,0,0,.35);opacity:${c.cancelled?.55:1};`
      + `animation:popIn .5s cubic-bezier(.22,1,.36,1) both${c.cancelled?'':', mintGlow 2.6s ease-out .05s'};`;
    card.innerHTML = `<div style="position:absolute;left:8px;top:15px;bottom:15px;width:3px;border-radius:3px;background:${c.accent};box-shadow:0 0 10px ${c.accent}88;"></div>
      <div style="font-size:18px;font-weight:600;letter-spacing:-.01em;color:${c.cancelled?'#8A8A99':'#F5F5F7'};${c.cancelled?'text-decoration:line-through;':''}">${c.title}</div>
      <div class="mono" style="font-size:12px;color:#7A7A88;margin-top:6px;">${c.detail}</div>
      <div style="display:flex;align-items:center;gap:7px;margin-top:10px;">
        <div style="width:6px;height:6px;border-radius:50%;background:${c.accent};box-shadow:0 0 6px ${c.accent};"></div>
        <span class="mono" style="font-size:11px;letter-spacing:.04em;color:${c.cancelled?c.accent:(CURRENT_MODE==='live'?c.accent:'#FBBF24')};">${c.cancelled?'cancelled live':(CURRENT_MODE==='live'?'on your calendar':'mock · not saved')}</span>
      </div>`;
    cardsEl.prepend(card);
    while (cardsEl.children.length > 6) cardsEl.removeChild(cardsEl.lastChild);
  }

  function onAction(text, muted) {
    const c = classify(text);
    if (muted) c.muted = true;
    revealDecision(c);
    if (!c.muted) addCard(c);
  }

  function resetView() {
    lines = []; interimEl = null; renderCaps();
    cardsEl.innerHTML = ''; if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; } showIdle();
  }

  // ---- calendar toggle ----
  function toggleCal() { const p = $('calPanel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }

  // ---- websocket ----
  let ws;
  function connect() {
    ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws');
    ws.onopen = () => setStatus('idle');
    ws.onclose = () => { setStatus('disconnected'); setTimeout(connect, 1500); };
    ws.onmessage = e => {
      const m = JSON.parse(e.data);
      if (m.type === 'caption') addCaption(m.text, m.final);
      else if (m.type === 'action') onAction(m.text, m.muted);
      else if (m.type === 'status') { setStatus(m.text); if (m.mode) setMode(m.mode); }
      else if (m.type === 'level') wave.style.transform = `scaleY(${(0.35 + Math.min(1, m.value * 2) * 0.85).toFixed(2)})`;
      else if (m.type === 'reset') resetView();
    };
  }
  function send(cmd) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ cmd })); }
  showIdle();
  connect();
</script>
</body>
</html>
